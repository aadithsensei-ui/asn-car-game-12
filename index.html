<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RACER X</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;image-rendering:crisp-edges}
#ui{position:absolute;top:0;left:50%;transform:translateX(-50%);width:420px;height:100vh;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
const W=420,H=700;
C.width=W;C.height=H;

// ─── STATE ───────────────────────────────────────────────────────────────────
let state='menu'; // menu | carselect | modeselect | playing | paused | gameover
let score=0,coins=0,hiScore=parseInt(localStorage.getItem('nrHi')||0);
let totalCoins=parseInt(localStorage.getItem('nrCoins')||0);
let speed=3,baseSpeed=3,frame=0,combo=0,comboTimer=0;
let nitro=100,nitroActive=false,nitroTimer=0;
let camShake=0,slowMo=false,slowMoTimer=0;
let dayNight=0,dnDir=1; // 0=day,1=night cycle
let rainDrops=[];
let particles=[];
let sparks=[];
let roadY=0;
let gameMode='medium'; // easy medium hard
let police=false,policeTimer=0,bossActive=false;
let boss=null;
let flashMsg='',flashTimer=0;

// ─── PLAYER CARS ─────────────────────────────────────────────────────────────
const carDefs=[
  {name:'VIPER',color:'#00ffff',accent:'#0088ff',speed:1.0,locked:false,cost:0},
  {name:'PHANTOM',color:'#ff00ff',accent:'#ff0088',speed:1.1,locked:false,cost:0},
  {name:'SPECTER',color:'#ffff00',accent:'#ff8800',speed:1.2,locked:true,cost:150},
  {name:'NOVA',color:'#00ff88',accent:'#00ffff',speed:1.3,locked:true,cost:300},
  {name:'WRAITH',color:'#ff4444',accent:'#ff0000',speed:1.5,locked:true,cost:600},
];
let selectedCar=0;
let unlockedCars=JSON.parse(localStorage.getItem('nrUnlocked')||'[0,1]');

// ─── PLAYER ──────────────────────────────────────────────────────────────────
let player={
  x:W/2,y:H-140,w:30,h:55,
  vx:0,vy:0,drift:0,
  alive:true
};

// ─── ROAD ────────────────────────────────────────────────────────────────────
const ROAD_L=60,ROAD_R=360;
const LANES=[105,175,245,315];

// ─── TRAFFIC ─────────────────────────────────────────────────────────────────
let traffic=[];
let trafficTimer=0;

// ─── COINS ───────────────────────────────────────────────────────────────────
let coinObjs=[];
let coinTimer=0;

// ─── KEYS ────────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Escape'&&state==='playing'){state='paused';}
  else if(e.key==='Escape'&&state==='paused'){state='playing';}
  if(e.key===' '&&state==='playing'){activateNitro();}
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Mouse / touch for buttons
C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  handleClick(mx,my);
});

// ─── AUDIO (Web Audio) ────────────────────────────────────────────────────────
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,type,dur,vol=0.3,delay=0){
  try{
    const a=getAudio();
    const o=a.createOscillator();
    const g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+delay);
    o.frequency.exponentialRampToValueAtTime(freq*0.5,a.currentTime+delay+dur);
    g.gain.setValueAtTime(vol,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.05);
  }catch(e){}
}
function playCrash(){playTone(150,'sawtooth',0.4,0.5);playTone(80,'square',0.6,0.4,0.1);}
function playNitro(){playTone(440,'square',0.15,0.2);playTone(550,'square',0.15,0.2,0.05);}
function playCoin(){playTone(880,'sine',0.1,0.2);playTone(1100,'sine',0.1,0.2,0.08);}
function playDrift(){playTone(200,'sawtooth',0.08,0.1);}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rnd(a,b){return Math.random()*(b-a)+a;}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rectHit(a,b){
  return Math.abs(a.x-b.x)<(a.w+b.w)/2&&Math.abs(a.y-b.y)<(a.h+b.h)/2;
}

function flash(msg){flashMsg=msg;flashTimer=90;}

function initRain(){rainDrops=[];for(let i=0;i<120;i++)rainDrops.push({x:rnd(0,W),y:rnd(0,H),len:rnd(10,25),spd:rnd(8,18)});}
initRain();

function spawnParticle(x,y,color,vx,vy,life=40,size=3){
  particles.push({x,y,color,vx,vy,life,maxLife:life,size});
}
function spawnSpark(x,y){
  for(let i=0;i<12;i++){
    const a=rnd(0,Math.PI*2);
    sparks.push({x,y,vx:Math.cos(a)*rnd(2,7),vy:Math.sin(a)*rnd(2,7),life:30,color:`hsl(${rndInt(20,60)},100%,60%)`});
  }
}

// ─── CAR DRAWING ─────────────────────────────────────────────────────────────
function drawCar(x,y,w,h,color,accent,drift=0,glow=true,isPlayer=false){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(drift*0.12);
  if(glow){
    ctx.shadowColor=color;ctx.shadowBlur=20;
  }
  // body
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.roundRect(-w/2,-h/2,w,h,5);
  ctx.fill();
  // windshield
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(-w/2+4,isPlayer?-h/2+8:-h/2+4,w-8,h*0.28);
  // accent stripe
  ctx.fillStyle=accent;
  ctx.fillRect(-w/2+3,isPlayer?h*0.05:-h*0.1,w-6,4);
  // headlights
  if(isPlayer){
    ctx.fillStyle='#fff';
    ctx.shadowColor='#fff';ctx.shadowBlur=15;
    ctx.fillRect(-w/2+2,-h/2+2,8,5);
    ctx.fillRect(w/2-10,-h/2+2,8,5);
  }else{
    ctx.fillStyle='#ff4400';
    ctx.shadowColor='#ff4400';ctx.shadowBlur=12;
    ctx.fillRect(-w/2+2,h/2-7,8,5);
    ctx.fillRect(w/2-10,h/2-7,8,5);
  }
  // wheels
  ctx.fillStyle='#111';ctx.shadowBlur=0;
  ctx.fillRect(-w/2-3,-h/2+5,6,10);
  ctx.fillRect(w/2-3,-h/2+5,6,10);
  ctx.fillRect(-w/2-3,h/2-15,6,10);
  ctx.fillRect(w/2-3,h/2-15,6,10);
  ctx.restore();
}

function drawBossCar(x,y){
  ctx.save();ctx.translate(x,y);
  ctx.shadowColor='#ff0000';ctx.shadowBlur=30;
  ctx.fillStyle='#ff0033';
  ctx.beginPath();ctx.roundRect(-22,-35,44,70,6);ctx.fill();
  ctx.fillStyle='#ff6600';ctx.fillRect(-18,-35+8,36,20);
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=20;
  for(let s of[-1,1]){ctx.fillRect(s*8,-35+2,10,7);}
  // siren
  const sin=Math.sin(frame*0.15);
  ctx.fillStyle=sin>0?'#ff0000':'#0000ff';
  ctx.shadowColor=sin>0?'#ff0000':'#0000ff';ctx.shadowBlur=25;
  ctx.fillRect(-10,-35-10,20,10);
  ctx.restore();
}

function drawPoliceCar(x,y,w,h){
  ctx.save();ctx.translate(x,y);
  ctx.shadowColor='#ffffff';ctx.shadowBlur=15;
  ctx.fillStyle='#cccccc';ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,4);ctx.fill();
  ctx.fillStyle='#333';ctx.fillRect(-w/2+3,-h/2+5,w-6,h*0.28);
  const sin=Math.sin(frame*0.2);
  ctx.fillStyle=sin>0?'#ff2200':'#0033ff';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=20;
  ctx.fillRect(-w/2+2,-h/2-8,w-4,8);
  ctx.fillStyle='#ff4400';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;
  ctx.fillRect(-w/2+2,h/2-7,8,5);ctx.fillRect(w/2-10,h/2-7,8,5);
  ctx.restore();
}

// ─── ROAD DRAWING ─────────────────────────────────────────────────────────────
function drawRoad(){
  // sky gradient
  const nightFactor=Math.sin(dayNight)*0.5+0.5;
  const sky=ctx.createLinearGradient(0,0,0,H);
  const r=Math.floor(lerp(20,5,nightFactor));
  const g2=Math.floor(lerp(20,5,nightFactor));
  const b=Math.floor(lerp(40,15,nightFactor));
  sky.addColorStop(0,`rgb(${r},${g2},${b})`);
  sky.addColorStop(1,`rgb(${Math.floor(lerp(30,10,nightFactor))},${Math.floor(lerp(10,5,nightFactor))},${Math.floor(lerp(60,20,nightFactor))})`);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // stars at night
  if(nightFactor>0.3){
    ctx.fillStyle=`rgba(255,255,255,${nightFactor*0.8})`;
    for(let i=0;i<40;i++){
      const sx=(i*137.5)%W;
      const sy=(i*97.3)%200;
      ctx.fillRect(sx,sy,1,1);
    }
  }

  // road surface
  const roadGrad=ctx.createLinearGradient(ROAD_L,0,ROAD_R,0);
  roadGrad.addColorStop(0,'#111122');
  roadGrad.addColorStop(0.5,'#1a1a2e');
  roadGrad.addColorStop(1,'#111122');
  ctx.fillStyle=roadGrad;ctx.fillRect(ROAD_L,0,ROAD_R-ROAD_L,H);

  // road glow edges
  const glowL=ctx.createLinearGradient(ROAD_L-10,0,ROAD_L+30,0);
  glowL.addColorStop(0,'rgba(0,200,255,0)');
  glowL.addColorStop(1,'rgba(0,200,255,0.15)');
  ctx.fillStyle=glowL;ctx.fillRect(ROAD_L-10,0,40,H);
  const glowR=ctx.createLinearGradient(ROAD_R-30,0,ROAD_R+10,0);
  glowR.addColorStop(0,'rgba(0,200,255,0.15)');
  glowR.addColorStop(1,'rgba(0,200,255,0)');
  ctx.fillStyle=glowR;ctx.fillRect(ROAD_R-30,0,40,H);

  // neon border lines
  ctx.strokeStyle='#00ffff';ctx.lineWidth=2;ctx.shadowColor='#00ffff';ctx.shadowBlur=15;
  ctx.beginPath();ctx.moveTo(ROAD_L,0);ctx.lineTo(ROAD_L,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ROAD_R,0);ctx.lineTo(ROAD_R,H);ctx.stroke();
  ctx.shadowBlur=0;

  // lane dashes
  ctx.setLineDash([40,30]);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  for(let i=1;i<4;i++){
    const lx=ROAD_L+(ROAD_R-ROAD_L)/4*i;
    ctx.beginPath();
    ctx.moveTo(lx,(-roadY%70));ctx.lineTo(lx,H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // rain
  if(nightFactor>0.4){
    ctx.strokeStyle=`rgba(150,200,255,${(nightFactor-0.4)*0.6})`;ctx.lineWidth=1;
    for(const d of rainDrops){
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-2,d.y+d.len);ctx.stroke();
    }
  }
}

// ─── SPEED LINES ─────────────────────────────────────────────────────────────
let speedLines=[];
function initSpeedLines(){speedLines=[];for(let i=0;i<30;i++)speedLines.push({x:rnd(ROAD_L+10,ROAD_R-10),y:rnd(0,H),len:rnd(20,60),alpha:rnd(0.1,0.5)});}
initSpeedLines();

function drawSpeedLines(spd){
  const intensity=clamp((spd-4)/8,0,1)+(nitroActive?0.5:0);
  if(intensity<=0)return;
  ctx.save();
  for(const l of speedLines){
    ctx.strokeStyle=`rgba(0,200,255,${l.alpha*intensity})`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x,l.y+l.len*intensity);ctx.stroke();
    l.y+=spd*(nitroActive?3:1.5);
    if(l.y>H){l.y=-60;l.x=rnd(ROAD_L+10,ROAD_R-10);}
  }
  ctx.restore();
}

// ─── TRAFFIC COLORS ──────────────────────────────────────────────────────────
const trafficColors=[
  ['#ff6600','#ff3300'],['#8800ff','#aa00ff'],['#00ff44','#00aa22'],
  ['#ffaa00','#ff6600'],['#0088ff','#00ccff'],['#ff0088','#ff00cc'],
];

function spawnTraffic(){
  const lane=LANES[rndInt(0,3)];
  const tc=trafficColors[rndInt(0,trafficColors.length-1)];
  const isPoliceSpawn=police&&Math.random()<0.15;
  traffic.push({
    x:lane,y:-60,w:28,h:52,
    vx:rnd(-0.5,0.5),vy:rnd(0.5,2),
    color:tc[0],accent:tc[1],
    isPolice:isPoliceSpawn,
    wobbleTimer:rnd(0,100)
  });
}

function spawnCoin(){
  coinObjs.push({x:rnd(ROAD_L+20,ROAD_R-20),y:-20,r:10});
}

// ─── GAME RESET ──────────────────────────────────────────────────────────────
function resetGame(){
  const mods={easy:{spd:2.5,spawn:80},medium:{spd:3,spawn:55},hard:{spd:4,spawn:35}};
  const m=mods[gameMode];
  baseSpeed=m.spd*(carDefs[selectedCar].speed);
  speed=baseSpeed;
  player.x=W/2;player.y=H-140;player.vx=0;player.drift=0;player.alive=true;
  traffic=[];coinObjs=[];particles=[];sparks=[];
  score=0;coins=0;combo=0;comboTimer=0;
  nitro=100;nitroActive=false;
  camShake=0;slowMo=false;slowMoTimer=0;
  trafficTimer=0;coinTimer=0;
  police=false;policeTimer=0;
  bossActive=false;boss=null;
  frame=0;flashMsg='';
}

function activateNitro(){
  if(nitro>=30&&!nitroActive){
    nitroActive=true;nitroTimer=180;
    playNitro();
    flash('NITRO BOOST!');
  }
}

// ─── BUTTON HELPERS ───────────────────────────────────────────────────────────
function btn(x,y,w,h,label,color='#00ffff',fontSize=16){
  const grd=ctx.createLinearGradient(x,y,x,y+h);
  grd.addColorStop(0,`${color}33`);
  grd.addColorStop(1,`${color}11`);
  ctx.fillStyle=grd;
  ctx.strokeStyle=color;ctx.lineWidth=2;
  ctx.shadowColor=color;ctx.shadowBlur=15;
  ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=color;ctx.font=`bold ${fontSize}px 'Courier New'`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2);
}

function inBtn(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function drawMenu(){
  // Animated bg
  ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);
  // grid lines
  ctx.strokeStyle='rgba(0,100,255,0.1)';ctx.lineWidth=1;
  for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
  for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

  // Title
  const t=frame*0.02;
  ctx.save();
  ctx.translate(W/2,H/2-180);
  ctx.shadowColor='#00ffff';ctx.shadowBlur=40;
  ctx.fillStyle='#00ffff';ctx.font='bold 48px Courier New';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NEON',0,-30);
  ctx.shadowColor='#ff00ff';ctx.shadowBlur=40;
  ctx.fillStyle='#ff00ff';ctx.font='bold 52px Courier New';
  ctx.fillText('RACER X',0,25);
  ctx.restore();

  // subtitle
  ctx.fillStyle='rgba(0,255,200,0.7)';ctx.font='12px Courier New';
  ctx.textAlign='center';ctx.fillText('HIGHWAY SURVIVAL',W/2,H/2-110);

  // animated demo car
  const demoX=W/2+Math.sin(t)*30;
  drawCar(demoX,H/2-60,30,55,carDefs[selectedCar].color,carDefs[selectedCar].accent,Math.sin(t)*1.5,true,true);

  // buttons
  btn(W/2-90,H/2+10,180,44,'▶  PLAY',carDefs[selectedCar].color);
  btn(W/2-90,H/2+65,180,44,'🚗  GARAGE','#ff00ff');
  btn(W/2-90,H/2+120,180,44,'🏁  MODE','#ffff00');

  // hi score
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='13px Courier New';
  ctx.textAlign='center';ctx.fillText(`HI-SCORE: ${hiScore}`,W/2,H/2+180);
  ctx.fillText(`COINS: ${totalCoins} 🪙`,W/2,H/2+200);

  // mode badge
  ctx.fillStyle='#ffff00';ctx.font='bold 13px Courier New';
  ctx.fillText(`MODE: ${gameMode.toUpperCase()}`,W/2,H/2+220);

  // controls hint
  ctx.fillStyle='rgba(0,200,255,0.4)';ctx.font='11px Courier New';
  ctx.fillText('WASD / ARROWS  ·  SPACE = NITRO',W/2,H-25);
}

function drawGarage(){
  ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#00ffff';ctx.font='bold 28px Courier New';ctx.textAlign='center';
  ctx.shadowColor='#00ffff';ctx.shadowBlur=20;
  ctx.fillText('GARAGE',W/2,50);ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px Courier New';
  ctx.fillText(`COINS: ${totalCoins} 🪙`,W/2,80);

  carDefs.forEach((c,i)=>{
    const row=Math.floor(i/2),col=i%2;
    const cx=110+col*200,cy=140+row*160;
    const unlocked=unlockedCars.includes(i);
    const sel=selectedCar===i;

    ctx.strokeStyle=sel?c.color:'rgba(255,255,255,0.2)';
    ctx.lineWidth=sel?2:1;ctx.shadowColor=sel?c.color:'transparent';ctx.shadowBlur=sel?15:0;
    ctx.fillStyle=sel?'rgba(0,255,255,0.05)':'rgba(255,255,255,0.03)';
    ctx.beginPath();ctx.roundRect(cx-70,cy-60,140,130,10);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;

    if(unlocked){
      drawCar(cx,cy-10,30,55,c.color,c.accent,0,true,true);
    }else{
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='28px Courier New';
      ctx.textAlign='center';ctx.fillText('🔒',cx,cy-10);
    }
    ctx.fillStyle=unlocked?c.color:'rgba(255,255,255,0.4)';
    ctx.font=`bold 11px Courier New`;ctx.textAlign='center';
    ctx.fillText(c.name,cx,cy+55);
    if(!unlocked){
      ctx.fillStyle='#ffaa00';ctx.font='10px Courier New';
      ctx.fillText(`${c.cost} 🪙`,cx,cy+70);
    }
    if(sel&&unlocked){
      ctx.fillStyle=c.color;ctx.font='9px Courier New';ctx.fillText('SELECTED',cx,cy+70);
    }
  });

  btn(W/2-70,H-65,140,40,'← BACK','#ff00ff');
}

function drawModeSelect(){
  ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffff00';ctx.font='bold 28px Courier New';ctx.textAlign='center';
  ctx.shadowColor='#ffff00';ctx.shadowBlur=20;ctx.fillText('SELECT MODE',W/2,60);ctx.shadowBlur=0;

  const modes=[
    {id:'easy',label:'EASY',color:'#00ff88',desc:'Slower traffic\nMore forgiveness'},
    {id:'medium',label:'MEDIUM',color:'#ffff00',desc:'Balanced challenge'},
    {id:'hard',label:'HARD',color:'#ff4400',desc:'Brutal speed\nNo mercy'},
  ];
  modes.forEach((m,i)=>{
    const y=130+i*150;
    const sel=gameMode===m.id;
    ctx.strokeStyle=sel?m.color:'rgba(255,255,255,0.2)';ctx.lineWidth=sel?2:1;
    ctx.fillStyle=sel?`${m.color}22`:'rgba(255,255,255,0.03)';
    ctx.shadowColor=sel?m.color:'transparent';ctx.shadowBlur=sel?20:0;
    ctx.beginPath();ctx.roundRect(40,y,W-80,110,10);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle=m.color;ctx.font=`bold 22px Courier New`;ctx.textAlign='center';
    ctx.fillText(m.label,W/2,y+35);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='12px Courier New';
    ctx.fillText(m.desc,W/2,y+65);
    if(sel){ctx.fillStyle=m.color;ctx.font='10px Courier New';ctx.fillText('▶ SELECTED',W/2,y+90);}
  });
  btn(W/2-70,H-65,140,40,'← BACK','#ff00ff');
}

function drawHUD(){
  // speed meter
  const spd=Math.floor(speed*40);
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,10,100,50,8);ctx.fill();
  ctx.fillStyle='#00ffff';ctx.font='bold 22px Courier New';ctx.textAlign='left';
  ctx.shadowColor='#00ffff';ctx.shadowBlur=10;
  ctx.fillText(`${spd}`,15,38);
  ctx.font='10px Courier New';ctx.fillStyle='rgba(0,255,255,0.6)';ctx.fillText('KM/H',15,52);
  ctx.shadowBlur=0;

  // score
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(W/2-60,10,120,40,8);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.font='bold 18px Courier New';ctx.textAlign='center';
  ctx.fillText(Math.floor(score),W/2,35);

  // coins
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(W-100,10,90,40,8);ctx.fill();
  ctx.fillStyle='#ffdd00';ctx.font='bold 16px Courier New';ctx.textAlign='right';
  ctx.fillText(`🪙 ${coins}`,W-12,33);

  // nitro bar
  const nitroColor=nitro>60?'#00ff88':nitro>30?'#ffaa00':'#ff4400';
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,H-80,120,18,5);ctx.fill();
  ctx.fillStyle=nitroColor;ctx.shadowColor=nitroColor;ctx.shadowBlur=10;
  ctx.beginPath();ctx.roundRect(12,H-78,(nitro/100)*116,14,4);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='9px Courier New';ctx.textAlign='left';
  ctx.fillText('NITRO',12,H-85);

  // combo
  if(combo>1){
    ctx.fillStyle=`hsl(${frame*3%360},100%,60%)`;
    ctx.font=`bold ${18+combo}px Courier New`;ctx.textAlign='center';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=15;
    ctx.fillText(`x${combo} COMBO!`,W/2,H-100);
    ctx.shadowBlur=0;
  }

  // hi score
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px Courier New';ctx.textAlign='right';
  ctx.fillText(`BEST: ${hiScore}`,W-10,H-10);

  // mode
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='9px Courier New';ctx.textAlign='left';
  ctx.fillText(gameMode.toUpperCase(),12,H-65);

  // police warning
  if(police){
    ctx.fillStyle=Math.sin(frame*0.2)>0?'#ff0000':'#0000ff';
    ctx.font='bold 12px Courier New';ctx.textAlign='center';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=20;
    ctx.fillText('⚠ POLICE CHASE ⚠',W/2,70);
    ctx.shadowBlur=0;
  }

  // flash message
  if(flashTimer>0){
    const alpha=Math.min(1,flashTimer/20);
    ctx.fillStyle=`rgba(255,255,0,${alpha})`;
    ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.shadowColor='#ffff00';ctx.shadowBlur=20;
    ctx.fillText(flashMsg,W/2,H/2-60);
    ctx.shadowBlur=0;
  }

  // pause hint
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='9px Courier New';ctx.textAlign='right';
  ctx.fillText('ESC=PAUSE',W-10,H-25);
}

function drawPause(){
  ctx.fillStyle='rgba(0,0,30,0.85)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';ctx.font='bold 36px Courier New';ctx.textAlign='center';
  ctx.shadowColor='#00ffff';ctx.shadowBlur=30;ctx.fillText('PAUSED',W/2,H/2-80);ctx.shadowBlur=0;
  btn(W/2-80,H/2-20,160,44,'▶  RESUME','#00ffff');
  btn(W/2-80,H/2+40,160,44,'🏠  MENU','#ff00ff');
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,20,0.9)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff0033';ctx.font='bold 42px Courier New';ctx.textAlign='center';
  ctx.shadowColor='#ff0033';ctx.shadowBlur=40;ctx.fillText('GAME OVER',W/2,H/2-160);ctx.shadowBlur=0;

  const lines=[
    {label:'SCORE',val:Math.floor(score),color:'#ffffff'},
    {label:'COINS',val:coins,color:'#ffdd00'},
    {label:'HI-SCORE',val:hiScore,color:'#00ffff'},
  ];
  lines.forEach((l,i)=>{
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(W/2-100,H/2-110+i*55,200,44,8);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px Courier New';ctx.textAlign='left';
    ctx.fillText(l.label,W/2-88,H/2-96+i*55);
    ctx.fillStyle=l.color;ctx.font='bold 22px Courier New';ctx.textAlign='right';
    ctx.fillText(l.val,W/2+88,H/2-96+i*55+18);
  });

  btn(W/2-90,H/2+65,180,44,'↺  RETRY',carDefs[selectedCar].color);
  btn(W/2-90,H/2+120,180,44,'🏠  MENU','#ff00ff');
}

// ─── CLICK HANDLER ────────────────────────────────────────────────────────────
function handleClick(mx,my){
  if(state==='menu'){
    if(inBtn(mx,my,W/2-90,H/2+10,180,44)){state='modeselect'!=='modeselect'?'playing':'playing';resetGame();state='playing';}
    if(inBtn(mx,my,W/2-90,H/2+10,180,44)){resetGame();state='playing';}
    if(inBtn(mx,my,W/2-90,H/2+65,180,44)){state='garage';}
    if(inBtn(mx,my,W/2-90,H/2+120,180,44)){state='modeselect';}
  }else if(state==='garage'){
    carDefs.forEach((c,i)=>{
      const row=Math.floor(i/2),col=i%2;
      const cx=110+col*200,cy=140+row*160;
      if(inBtn(mx,my,cx-70,cy-60,140,130)){
        if(unlockedCars.includes(i)){selectedCar=i;}
        else if(totalCoins>=c.cost){
          totalCoins-=c.cost;unlockedCars.push(i);selectedCar=i;
          localStorage.setItem('nrUnlocked',JSON.stringify(unlockedCars));
          localStorage.setItem('nrCoins',totalCoins);
          flash('UNLOCKED!');
        }
      }
    });
    if(inBtn(mx,my,W/2-70,H-65,140,40)){state='menu';}
  }else if(state==='modeselect'){
    ['easy','medium','hard'].forEach((m,i)=>{if(inBtn(mx,my,40,130+i*150,W-80,110)){gameMode=m;}});
    if(inBtn(mx,my,W/2-70,H-65,140,40)){state='menu';}
  }else if(state==='paused'){
    if(inBtn(mx,my,W/2-80,H/2-20,160,44)){state='playing';}
    if(inBtn(mx,my,W/2-80,H/2+40,160,44)){state='menu';}
  }else if(state==='gameover'){
    if(inBtn(mx,my,W/2-90,H/2+65,180,44)){resetGame();state='playing';}
    if(inBtn(mx,my,W/2-90,H/2+120,180,44)){state='menu';}
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(){
  frame++;
  const dt=slowMo?0.3:1;

  // day/night cycle
  dayNight+=0.003*dt;

  // rain
  const nightFactor=Math.sin(dayNight)*0.5+0.5;
  if(nightFactor>0.4){
    for(const d of rainDrops){d.y+=d.spd*dt;if(d.y>H){d.y=-20;d.x=rnd(0,W);}}
  }

  if(state!=='playing')return;

  // speed ramp
  speed=lerp(speed,baseSpeed+frame*0.0008*(gameMode==='hard'?1.5:gameMode==='easy'?0.5:1),0.02);
  if(nitroActive){speed=Math.min(speed*1.8,30);}

  // nitro
  if(nitroActive){
    nitroTimer-=dt;nitro=Math.max(0,nitro-0.5*dt);
    if(nitroTimer<=0||nitro<=0){nitroActive=false;}
  }else{
    nitro=Math.min(100,nitro+0.08*dt);
  }

  // score
  score+=speed*0.1*dt*(combo>1?1+combo*0.1:1);

  // combo decay
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}

  // flash
  if(flashTimer>0)flashTimer-=dt;

  // slow mo
  if(slowMoTimer>0){slowMoTimer-=dt;if(slowMoTimer<=0)slowMo=false;}

  // cam shake
  if(camShake>0)camShake-=0.5*dt;

  // police spawn
  policeTimer+=dt;
  if(policeTimer>1800&&!police){police=true;policeTimer=0;flash('⚠ POLICE CHASE!');}
  if(police&&policeTimer>3600){police=false;policeTimer=0;}

  // boss spawn
  if(score>5000&&!bossActive&&!boss){
    bossActive=true;
    boss={x:W/2,y:-80,w:44,h:70,vx:0,vy:0.5,hp:5};
    flash('⚠ BOSS RACER!');
  }

  // input
  const moveSpd=4+(nitroActive?2:0);
  let turning=false;
  if(keys['a']||keys['A']||keys['ArrowLeft']){player.vx=lerp(player.vx,-moveSpd,0.15);player.drift=lerp(player.drift,-1.5,0.1);turning=true;if(Math.random()<0.05)playDrift();}
  if(keys['d']||keys['D']||keys['ArrowRight']){player.vx=lerp(player.vx,moveSpd,0.15);player.drift=lerp(player.drift,1.5,0.1);turning=true;if(Math.random()<0.05)playDrift();}
  if(!turning){player.vx=lerp(player.vx,0,0.15);player.drift=lerp(player.drift,0,0.1);}
  if(keys['w']||keys['W']||keys['ArrowUp']){player.vy=lerp(player.vy,-3,0.1);}
  else if(keys['s']||keys['S']||keys['ArrowDown']){player.vy=lerp(player.vy,3,0.1);}
  else{player.vy=lerp(player.vy,0,0.1);}
  if(keys[' '])activateNitro();

  player.x+=player.vx*dt;
  player.y+=player.vy*dt;
  player.x=clamp(player.x,ROAD_L+player.w/2,ROAD_R-player.w/2);
  player.y=clamp(player.y,50,H-60);

  // nitro particles
  if(nitroActive&&frame%2===0){
    spawnParticle(player.x+rnd(-8,8),player.y+player.h/2,'#00ffff',rnd(-1,1),rnd(3,8),25,4);
    spawnParticle(player.x+rnd(-5,5),player.y+player.h/2,'#ff00ff',rnd(-1,1),rnd(2,6),20,3);
  }

  // road scroll
  roadY+=speed*2*dt;

  // spawn traffic
  trafficTimer+=dt;
  const spawnRate=gameMode==='hard'?28:gameMode==='easy'?65:45;
  if(trafficTimer>Math.max(20,spawnRate-frame*0.01)){
    spawnTraffic();trafficTimer=0;
  }

  // spawn coins
  coinTimer+=dt;
  if(coinTimer>90){spawnCoin();coinTimer=0;}

  // update traffic
  for(let i=traffic.length-1;i>=0;i--){
    const t=traffic[i];
    t.wobbleTimer+=0.05*dt;
    t.x+=t.vx*(1+Math.sin(t.wobbleTimer)*0.2)*dt;
    t.y+=((t.vy+speed*0.8))*dt;
    // police chases player
    if(t.isPolice){
      t.x=lerp(t.x,player.x,0.01*dt);
      t.y+=0.5*dt;
    }
    if(t.y>H+80)traffic.splice(i,1);

    // collision
    if(rectHit(player,t)&&player.alive){
      handleCrash();return;
    }
  }

  // update boss
  if(boss){
    boss.wobble=(boss.wobble||0)+0.05;
    boss.x=lerp(boss.x,player.x,0.005*dt)+Math.sin(boss.wobble)*1.5;
    boss.y+=boss.vy*dt;
    if(boss.y>H+100){boss=null;bossActive=false;}
    const bossHit={x:boss.x,y:boss.y,w:boss.w,h:boss.h};
    if(rectHit(player,bossHit)&&player.alive){handleCrash();return;}
  }

  // update coins
  for(let i=coinObjs.length-1;i>=0;i--){
    const c=coinObjs[i];
    c.y+=speed*dt;
    if(c.y>H+20){coinObjs.splice(i,1);continue;}
    const dx=player.x-c.x,dy=player.y-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<player.w/2+c.r){
      coinObjs.splice(i,1);coins++;totalCoins++;
      combo++;comboTimer=180;
      playCoin();
      spawnParticle(c.x,c.y,'#ffdd00',0,-3,30,5);
      localStorage.setItem('nrCoins',totalCoins);
    }
  }

  // update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.1*dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;
    if(s.life<=0)sparks.splice(i,1);
  }
}

function handleCrash(){
  player.alive=false;
  playCrash();
  spawnSpark(player.x,player.y);
  camShake=20;slowMo=true;slowMoTimer=120;
  // big explosion particles
  for(let i=0;i<30;i++){
    const a=rnd(0,Math.PI*2);
    spawnParticle(player.x,player.y,`hsl(${rndInt(0,60)},100%,60%)`,Math.cos(a)*rnd(1,8),Math.sin(a)*rnd(1,8),60,rnd(3,8));
  }
  if(score>hiScore){hiScore=Math.floor(score);localStorage.setItem('nrHi',hiScore);}
  setTimeout(()=>{state='gameover';},1200);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);

  if(state==='menu'){drawMenu();return;}
  if(state==='garage'){drawRoad();drawGarage();return;}
  if(state==='modeselect'){drawRoad();drawModeSelect();return;}

  // camera shake
  ctx.save();
  if(camShake>0){ctx.translate(rnd(-camShake,camShake),rnd(-camShake,camShake));}

  drawRoad();
  drawSpeedLines(speed);

  // coins
  for(const c of coinObjs){
    ctx.save();
    ctx.shadowColor='#ffdd00';ctx.shadowBlur=15;
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffaa00';ctx.font='bold 10px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('$',c.x,c.y);
    ctx.restore();
  }

  // particles
  for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  for(const s of sparks){
    const alpha=s.life/30;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=s.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*2,s.y-s.vy*2);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // traffic
  for(const t of traffic){
    if(t.isPolice){drawPoliceCar(t.x,t.y,t.w,t.h);}
    else{drawCar(t.x,t.y,t.w,t.h,t.color,t.accent,0,true,false);}
  }

  // boss
  if(boss){drawBossCar(boss.x,boss.y);}

  // player
  if(player.alive){
    const c=carDefs[selectedCar];
    // exhaust trail
    if(speed>5||nitroActive){
      ctx.shadowColor=nitroActive?'#ff00ff':'#00aaff';ctx.shadowBlur=15;
      ctx.fillStyle=nitroActive?'rgba(255,0,255,0.6)':'rgba(0,100,255,0.5)';
      for(let i=1;i<=5;i++){
        const alpha=(6-i)/6;
        ctx.globalAlpha=alpha*0.3;
        ctx.beginPath();ctx.arc(player.x+rnd(-3,3),player.y+player.h/2+i*5,2+i*0.5,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
    drawCar(player.x,player.y,player.w,player.h,c.color,c.accent,player.drift,true,true);
  }

  ctx.restore();

  if(state==='playing')drawHUD();
  if(state==='paused')drawPause();
  if(state==='gameover')drawGameOver();
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(){
  update();draw();
  requestAnimationFrame(loop);
}
loop();
</script>
